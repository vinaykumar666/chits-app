services:
  app:
    image: ${DOCKER_USERNAME:-ygc}/ygc-chits:latest
    pull_policy: never
    container_name: ygc-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-ygcdb}
      DB_USERNAME: ${DB_USERNAME:-ygcuser}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      CORS_ORIGINS: https://${YGC_DOMAIN:-localhost}
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads
    networks: [ygc-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  postgres:
    image: postgres:16-alpine
    pull_policy: if_not_present
    container_name: ygc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-ygcdb}
      POSTGRES_USER: ${DB_USERNAME:-ygcuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [ygc-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-ygcuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    pull_policy: if_not_present
    container_name: ygc-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ygc-web/dist:/usr/share/nginx/html:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on: [app]
    networks: [ygc-net]

networks:
  ygc-net:
    driver: bridge

volumes:
  pgdata:
