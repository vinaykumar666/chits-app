  postgres:
    image: postgres:16-alpine
    container_name: ygc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-ygcdb}
      POSTGRES_USER: ${DB_USERNAME:-ygcuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-ygcuser} -d ${DB_NAME:-ygcdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot App ────────────────────────────────────────
  app:
    image: vinaykumarmedipalli/chits-app:latest
    container_name: ygc-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

    environment:
      SPRING_PROFILES_ACTIVE: prod

      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-ygcdb}
      DB_USERNAME: ${DB_USERNAME:-ygcuser}
      DB_PASSWORD: ${DB_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}

      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}

      # ── FIX: JVM heap & GC tuning ────────────────────────────
      # -Xms512m        : initial heap (avoids slow ramp-up on startup)
      # -Xmx1g          : max heap — increase to 2g if you have RAM to spare
      # -XX:+UseG1GC    : G1 has better pause-time for web workloads vs ParallelGC
      # -XX:MaxGCPauseMillis=200 : target pause < 200 ms
      # -XX:+HeapDumpOnOutOfMemoryError : capture OOM for diagnosis
      # -XX:HeapDumpPath : write dump inside the container's upload volume
      # -Djava.security.egd : faster SecureRandom (speeds up JWT signing)
      JAVA_OPTS: >-
        -Xms512m
        -Xmx1g
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
        -XX:+HeapDumpOnOutOfMemoryError
        -XX:HeapDumpPath=/app/uploads/heapdump.hprof
        -Djava.security.egd=file:/dev/./urandom

    volumes:
      - uploads_data:/app/uploads

    ports:
      - "8080:8080"

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/login || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 5

volumes:
  postgres_data:
  uploads_data:
#  grafana_data:
