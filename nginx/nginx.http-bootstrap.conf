# Temporary HTTP-only nginx config used BEFORE the first SSL certificate exists.
# Serves ACME challenges and a simple health page on port 80.

server {
    listen 80;
    server_name __YGC_DOMAIN__;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 200 'YGC Chits — SSL setup in progress. Certificate will be issued shortly.\n';
        add_header Content-Type text/plain;
    }
}
