name: Deploy YGC Production

on:
  push:
    branches:
      - feature/extreme-features

concurrency:
  group: production
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOCKER_BUILDKIT: 1
  DEPLOY_BRANCH: feature/extreme-features

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build Application
        run: mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t vinaykumarmedipalli/chits-app:latest .

      - name: Push Docker Image
        run: docker push vinaykumarmedipalli/chits-app:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail

            DEPLOY_BRANCH="${{ env.DEPLOY_BRANCH }}"
            HEALTH_URL="http://localhost:8080/login"
            MAX_ATTEMPTS=36

            cd ~/chits-app

            git fetch origin
            git reset --hard "origin/${DEPLOY_BRANCH}"

            docker compose down --remove-orphans || true

            docker compose pull

            docker compose up -d --force-recreate

            echo "Waiting for ygc-app (up to ${MAX_ATTEMPTS}0s)..."
            for i in $(seq 1 "${MAX_ATTEMPTS}"); do
              if curl -fsS --max-time 10 "${HEALTH_URL}" >/dev/null 2>&1; then
                echo "Application healthy after ${i}0s"
                docker compose ps
                docker image prune -af
                exit 0
              fi

              # Fail fast if the app container exited/crashed
              if ! docker ps --format '{{.Names}}' | grep -qx 'ygc-app'; then
                echo "ERROR: ygc-app container is not running"
                docker compose ps -a
                docker logs ygc-app --tail 200 2>&1 || true
                exit 1
              fi

              echo "Attempt ${i}/${MAX_ATTEMPTS} — not ready yet, retrying in 10s..."
              sleep 10
            done

            echo "ERROR: Health check timed out after ${MAX_ATTEMPTS}0s"
            docker compose ps -a
            docker logs ygc-app --tail 200 2>&1 || true
            docker logs ygc-postgres --tail 80 2>&1 || true
            exit 1
