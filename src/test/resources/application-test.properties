spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.thymeleaf.cache=false
spring.thymeleaf.check-template-location=false

jwt.secret=test-jwt-secret-key-for-unit-tests-only-12345
jwt.expiration=86400000

spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test@test.com
spring.mail.password=testpass
ygc.mail.from=test@test.com
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

ygc.late-fine-per-day=20
ygc.early-exit-deduction-percentage=2
ygc.default-admin-commission-percentage=5
ygc.app-name=YGC Test
ygc.app-tagline=Test Mode

logging.level.root=WARN
logging.level.com.ygc=DEBUG
