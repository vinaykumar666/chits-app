# Application
spring.application.name=YGC Internal Chit Management
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:ygcdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false

# JWT
jwt.secret=${JWT_SECRET:secret}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Mail - set to false to avoid startup failure if SMTP not configured
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:medipalli.vinaykumar@gmail.com}
spring.mail.password=${MAIL_PASSWORD:eednsfhdtyptvaov}
ygc.mail.from=${MAIL_FROM:${spring.mail.username}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=3000
spring.mail.properties.mail.smtp.timeout=3000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# YGC Business Rules
ygc.late-fine-per-day=20
ygc.early-exit-deduction-percentage=2
ygc.default-admin-commission-percentage=5
ygc.app-name=YGC Internal
ygc.app-tagline=Save Rupee, Rupee Will Save You In Future

# Async support
spring.task.execution.pool.core-size=2

# Scheduling support
spring.task.scheduling.pool.size=2

# Logging Configuration
logging.level.root=INFO
logging.level.com.ygc=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
