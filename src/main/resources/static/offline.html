<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Offline - YGC Internal</title>
<style>
  body { background: linear-gradient(135deg, #1a1a2e, #0f3460); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; }
  .box { background: white; border-radius: 20px; padding: 40px; text-align: center; max-width: 360px; width: 90%; }
  .icon { font-size: 4rem; margin-bottom: 16px; }
  h2 { color: #1a1a2e; font-weight: 800; margin: 0 0 8px; }
  p { color: #666; margin: 0 0 24px; }
  button { background: #f0a500; border: none; color: #000; font-weight: 700; padding: 12px 28px; border-radius: 10px; font-size: 1rem; cursor: pointer; }
  button:hover { background: #d4930a; }
</style>
</head>
<body>
<div class="box">
  <div class="icon">📡</div>
  <h2>You're Offline</h2>
  <p>Please check your internet connection. Your data is safe and will sync when you're back online.</p>
  <button onclick="window.location.reload()">Try Again</button>
</div>
</body>
</html>
