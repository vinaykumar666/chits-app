<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Approve Payment')}"></head>
<body>
<div th:replace="~{fragments :: adminSidebar('payments')}"></div>
<div class="main-content">
  <div class="topbar">
    <div>
      <a th:href="@{/admin/payments}" class="text-muted text-decoration-none small"><i class="bi bi-arrow-left"></i> Back to Payments</a>
      <h4 class="mt-1"><i class="bi bi-cash-coin text-warning me-2"></i>Approve Payment</h4>
    </div>
    <div class="d-flex align-items-center gap-2">
      <span class="ygc-conn-dot"></span>
      <button id="ygc-bell-btn" class="btn btn-link p-0 position-relative text-secondary" style="font-size:1.3rem;line-height:1">
        <i class="bi bi-bell"></i>
        <span id="ygc-notif-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size:.6rem;display:none"></span>
      </button>
      <span class="user-badge" th:text="${user.fullName}">Admin</span>
    </div>
  </div>
  <div th:replace="~{fragments :: alerts}"></div>
  <div class="card panel">
    <div class="card-header"><i class="bi bi-receipt me-2"></i>Payment Details</div>
    <div class="card-body">
      <div class="row g-3 mb-4">
        <div class="col-md-6">
          <label class="text-muted small">Member</label>
          <div class="fw-bold" th:text="${payment.membership.user.fullName}"></div>
        </div>
        <div class="col-md-6">
          <label class="text-muted small">Chit</label>
          <div class="fw-bold" th:text="${payment.membership.chit.name}"></div>
        </div>
        <div class="col-md-4">
          <label class="text-muted small">Month</label>
          <div th:text="'Month ' + ${payment.monthNumber}"></div>
        </div>
        <div class="col-md-4">
          <label class="text-muted small">Amount</label>
          <div th:text="'₹' + ${payment.amount}"></div>
        </div>
        <div class="col-md-4">
          <label class="text-muted small">Total (incl. fine)</label>
          <div class="fw-bold text-success" th:text="'₹' + ${payment.totalAmount}"></div>
        </div>
        <div th:if="${payment.screenshotPath != null and payment.screenshotPath != 'N/A'}" class="col-12">
          <label class="text-muted small">Payment Screenshot</label>
          <div><img th:src="@{/admin/payments/{id}/view-screenshot(id=${payment.id})}"
                    style="max-width:400px;max-height:300px;border-radius:8px;border:1px solid #dee2e6" alt="Screenshot"></div>
        </div>
      </div>
      <div class="d-flex gap-2">
        <form th:action="@{/admin/payments/{id}/approve(id=${payment.id})}" method="post">
          <input type="hidden" name="remarks" value="Approved by admin">
          <button class="btn btn-success fw-bold"><i class="bi bi-check-lg me-1"></i>Approve Payment</button>
        </form>
        <button class="btn btn-danger fw-bold" data-bs-toggle="modal" data-bs-target="#rejectModal">
          <i class="bi bi-x-lg me-1"></i>Reject
        </button>
        <a th:href="@{/admin/payments}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </div>
  </div>
</div>
<!-- Reject modal -->
<div class="modal fade" id="rejectModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-danger text-white">
        <h5 class="modal-title"><i class="bi bi-x-circle me-2"></i>Reject Payment</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <form th:action="@{/admin/payments/{id}/verify(id=${payment.id})}" method="post">
        <input type="hidden" name="approved" value="false">
        <div class="modal-body">
          <label class="form-label fw-semibold">Rejection Reason <span class="text-danger">*</span></label>
          <textarea name="remarks" class="form-control" rows="3" required
                    placeholder="e.g. Screenshot unclear, amount mismatch..."></textarea>
          <small class="text-muted mt-1 d-block"><i class="bi bi-info-circle me-1"></i>Member will receive push notification + email with this reason.</small>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-danger fw-bold">Confirm Rejection</button>
        </div>
      </form>
    </div>
  </div>
</div>
<div th:replace="~{fragments :: appScripts}"></div>
</body></html>
