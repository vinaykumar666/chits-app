<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="YGC Chits">
    <link rel="manifest" th:href="@{/manifest.json}">
    <link rel="apple-touch-icon" th:href="@{/icons/icon-192.png}">
    <title>Change Password - YGC Internal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); min-height: 100vh; display: flex; align-items: center; }
        .card { border: none; border-radius: 20px; box-shadow: 0 25px 70px rgba(0,0,0,.5); }
        .brand-icon { width: 52px; height: 52px; background: #f0a500; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.5rem; color: #000; margin: 0 auto 12px; }
        .btn-set { background: #f0a500; border: none; color: #000; font-weight: 700; padding: 12px; border-radius: 10px; }
        .btn-set:hover { background: #d4930a; color: #000; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <div class="brand-icon">Y</div>
                        <h3 class="fw-bold mb-1">Set New Password</h3>
                        <p class="text-muted small">You must change your temporary password before continuing.</p>
                    </div>
                    <div th:if="${error}" class="alert alert-danger py-2"><i class="bi bi-exclamation-circle me-2"></i><span th:text="${error}"></span></div>
                    <div class="alert alert-warning py-2 small">
                        <i class="bi bi-lock me-2"></i>Choose a strong password with at least 8 characters.
                    </div>
                    <form th:action="@{/change-password}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">New Password</label>
                            <input type="password" name="newPassword" class="form-control form-control-lg" minlength="8" placeholder="Min. 8 characters" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Confirm Password</label>
                            <input type="password" name="confirmPassword" class="form-control form-control-lg" minlength="8" placeholder="Repeat your password" required>
                        </div>
                        <button type="submit" class="btn btn-set w-100 fs-6"><i class="bi bi-shield-check me-2"></i>Set New Password &amp; Login</button>
                    </form>
                    <p class="text-center mt-3 mb-0 small text-muted">Support: <a href="tel:+918919508889" class="text-warning">+91 8919508889</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments :: appScripts}"></div>
</body></html>
