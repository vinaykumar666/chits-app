<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - YGC Internal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; display: flex; align-items: center; }
        .login-card { border: none; border-radius: 20px; box-shadow: 0 25px 70px rgba(0,0,0,0.5); }
        .brand-title { color: #f0a500; font-weight: 800; font-size: 2rem; }
        .brand-icon { width: 56px; height: 56px; background: #f0a500; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.6rem; color: #000; margin: 0 auto 12px; }
        .btn-login { background: #f0a500; border: none; color: #000; font-weight: 700; padding: 12px; font-size: 1rem; border-radius: 10px; }
        .btn-login:hover { background: #d4930a; color: #000; }
        .form-control:focus { border-color: #f0a500; box-shadow: 0 0 0 .2rem rgba(240,165,0,.2); }
        .divider { height: 1px; background: #e0e0e0; margin: 16px 0; }
        .contact-badge { background: rgba(240,165,0,.1); border: 1px solid rgba(240,165,0,.3); border-radius: 8px; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="login-card card">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <div class="brand-icon">Y</div>
                        <div class="brand-title">YGC Internal</div>
                        <p class="text-muted small mb-0">Save Rupee, Rupee Will Save You In Future</p>
                    </div>

                    <div th:if="${error}" class="alert alert-danger py-2"><i class="bi bi-exclamation-circle me-2"></i><span th:text="${error}"></span></div>
                    <div th:if="${message}" class="alert alert-success py-2"><i class="bi bi-check-circle me-2"></i><span th:text="${message}"></span></div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-muted small">EMAIL ADDRESS</label>
                            <input type="email" name="username" class="form-control form-control-lg" placeholder="you@example.com" required autofocus>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold text-muted small">PASSWORD</label>
                            <input type="password" name="password" class="form-control form-control-lg" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-login w-100"><i class="bi bi-box-arrow-in-right me-2"></i>Login to YGC</button>
                    </form>

                    <div class="divider"></div>

                    <p class="text-center mb-3 text-muted small">New member? <a th:href="@{/register}" class="fw-bold text-warning">Register here</a></p>
                    <p class="text-center mb-3"><a th:href="@{/terms}" class="text-muted small">View Terms &amp; Conditions</a></p>

                    <div class="contact-badge p-2 text-center">
                        <small class="text-muted d-block">Need help? Call Admin</small>
                        <a href="tel:+918919508889" class="fw-bold text-warning text-decoration-none"><i class="bi bi-telephone me-1"></i>+91 8919508889</a>
                    </div>
                </div>
            </div>
            <p class="text-center mt-3 text-white-50 small">YGC Internal Chit Management v2.0</p>
        </div>
    </div>
</div>
</body></html>
