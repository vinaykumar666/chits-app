<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="YGC Chits">
  <link rel="manifest" th:href="@{/manifest.json}">
  <link rel="apple-touch-icon" th:href="@{/icons/icon-192.png}">
  <title>Login - YGC Internal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <style>
    :root { --gold:#f0a500; --gold-dark:#d4930a; --dark:#0f0f1a; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { height: 100%; }
    body {
      background: linear-gradient(160deg, #0f0f1a 0%, #161628 30%, #1a1a35 60%, #0f3460 100%);
      min-height: 100vh; min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Inter', system-ui, sans-serif;
      padding: env(safe-area-inset-top,0) env(safe-area-inset-right,16px) env(safe-area-inset-bottom,0) env(safe-area-inset-left,16px);
      position: relative;
      overflow: hidden;
    }
    /* Decorative orbs */
    body::before {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(240,165,0,.12), transparent 70%);
      top: -100px; right: -100px;
      border-radius: 50%;
      animation: float 8s ease-in-out infinite;
    }
    body::after {
      content: '';
      position: absolute;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(15,52,96,.3), transparent 70%);
      bottom: -80px; left: -80px;
      border-radius: 50%;
      animation: float 10s ease-in-out infinite reverse;
    }
    @keyframes float {
      0%, 100% { transform: translate(0,0); }
      50% { transform: translate(20px, -20px); }
    }
    .login-wrapper { width: 100%; max-width: 420px; padding: 16px; position: relative; z-index: 1; }
    .login-card {
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 24px;
      box-shadow: 0 32px 80px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.03) inset;
      overflow: hidden;
      background: rgba(22,22,40,.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }
    .card-body { padding: 44px 40px; }
    .brand-logo { width: 56px; height: 56px; border-radius: 16px; object-fit: contain; margin: 0 auto 14px; display: block; }
    .brand-icon {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, #f0a500, #f5c542);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 1.8rem; color: #000; margin: 0 auto 14px;
      box-shadow: 0 8px 24px rgba(240,165,0,.3);
    }
    .brand-title { color: var(--gold); font-weight: 900; font-size: 2rem; letter-spacing: -.02em; }
    .tagline { color: rgba(255,255,255,.35); font-size: .75rem; letter-spacing: .08em; text-transform: uppercase; font-weight: 600; }
    .btn-login {
      background: linear-gradient(135deg, #f0a500, #f5c542, #e89900);
      border: none; color: #000;
      font-weight: 800; padding: 14px; font-size: 1rem;
      border-radius: 12px; width: 100%; min-height: 50px;
      letter-spacing: .02em;
      box-shadow: 0 4px 16px rgba(240,165,0,.3);
      transition: all .25s cubic-bezier(.4,0,.2,1);
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(240,165,0,.4);
      color: #000;
    }
    .btn-login:active { transform: translateY(0); }
    .form-label { color: rgba(255,255,255,.4); font-weight: 700; font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; }
    .form-control {
      font-size: 16px; border-radius: 12px; padding: 13px 16px;
      min-height: 50px;
      background: rgba(255,255,255,.06);
      border: 1.5px solid rgba(255,255,255,.08);
      color: #fff;
      transition: all .2s;
    }
    .form-control::placeholder { color: rgba(255,255,255,.2); }
    .form-control:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(240,165,0,.15);
      background: rgba(255,255,255,.08);
      color: #fff;
    }
    .divider { height: 1px; background: rgba(255,255,255,.06); margin: 24px 0; }
    .contact-badge {
      background: rgba(240,165,0,.06);
      border: 1px solid rgba(240,165,0,.12);
      border-radius: 14px; padding: 14px;
    }
    a.text-warning { color: var(--gold) !important; }
    .text-muted { color: rgba(255,255,255,.35) !important; }
    .alert { border-radius: 12px; font-size: .88rem; font-weight: 500; border: none; }
    .alert-danger { background: rgba(239,68,68,.12); color: #fca5a5; }
    .alert-success { background: rgba(16,185,129,.12); color: #6ee7b7; }
    @media (max-width: 480px) {
      .login-card { border-radius: 20px; }
      .card-body { padding: 32px 24px; }
      .brand-title { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
<div class="login-wrapper">
  <div class="login-card card">
    <div class="card-body">
      <div class="text-center mb-4">
        <img th:src="@{/images/ygc-logo.png}" alt="YGC" class="brand-logo"
             onerror="this.style.display='none';document.getElementById('login-brand-fallback').style.display='flex'">
        <div class="brand-icon" id="login-brand-fallback" style="display:none">Y</div>
        <div class="brand-title" th:text="#{app.name}">YGC Internal</div>
        <p class="tagline mb-0 mt-1" th:text="#{app.tagline}">Save Rupee, Rupee Will Save You In Future</p>
      </div>

      <div th:if="${error}" class="alert alert-danger py-2 small"><i class="bi bi-exclamation-circle me-2"></i><span th:text="#{login.error}"></span></div>
      <div th:if="${message}" class="alert alert-success py-2 small"><i class="bi bi-check-circle me-2"></i><span th:text="#{login.logout_msg}"></span></div>

      <form th:action="@{/login}" method="post" autocomplete="on">
        <div class="mb-3">
          <label class="form-label" th:text="#{login.email}">Email Address</label>
          <input type="email" name="username" class="form-control" placeholder="you@example.com"
                 required autofocus autocomplete="username" inputmode="email">
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="••••••••"
                 required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-login">
          <i class="bi bi-box-arrow-in-right me-2"></i>Login to YGC
        </button>
      </form>

      <div class="divider"></div>

      <p class="text-center mb-3 small" style="color:rgba(255,255,255,.4)">
        New member? <a th:href="@{/register}" class="fw-bold text-warning text-decoration-none">Register here</a>
      </p>
      <p class="text-center mb-3">
        <a th:href="@{/terms}" class="small text-decoration-none" style="color:rgba(255,255,255,.25)">View Terms & Conditions</a>
      </p>

      <div class="contact-badge text-center">
        <small class="d-block mb-1" style="color:rgba(255,255,255,.3)">Need help? Contact Admin</small>
        <a href="tel:+918919508889" class="fw-bold text-warning text-decoration-none">
          <i class="bi bi-telephone me-1"></i>+91 8919508889
        </a>
      </div>
    </div>
  </div>
  <p class="text-center mt-3 small" style="color:rgba(255,255,255,.2)">YGC Internal Chit Management v4.0</p>
  <div class="text-center mt-2">
    <a href="?lang=en" class="badge text-decoration-none" style="background:rgba(255,255,255,.1);color:rgba(255,255,255,.5)">English</a>
    <a href="?lang=hi" class="badge text-decoration-none" style="background:rgba(255,255,255,.1);color:rgba(255,255,255,.5)">हिन्दी</a>
    <a href="?lang=te" class="badge text-decoration-none" style="background:rgba(255,255,255,.1);color:rgba(255,255,255,.5)">తెలుగు</a>
    <a href="?lang=kn" class="badge text-decoration-none" style="background:rgba(255,255,255,.1);color:rgba(255,255,255,.5)">ಕನ್ನಡ</a>
    <a href="?lang=ta" class="badge text-decoration-none" style="background:rgba(255,255,255,.1);color:rgba(255,255,255,.5)">தமிழ்</a>
  </div>
</div>

<div th:replace="~{fragments :: appScripts}"></div>
</body>
</html>
