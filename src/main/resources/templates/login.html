<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="YGC Chits">
  <link rel="manifest" th:href="@{/manifest.json}">
  <link rel="apple-touch-icon" th:href="@{/icons/icon-192.png}">
  <title>Login - YGC Internal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <style>
    :root { --gold:#f0a500; --gold-dark:#d4930a; --dark:#1a1a2e; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { height: 100%; }
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh; min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: env(safe-area-inset-top,0) env(safe-area-inset-right,16px) env(safe-area-inset-bottom,0) env(safe-area-inset-left,16px);
    }
    .login-wrapper { width: 100%; max-width: 400px; padding: 16px; }
    .login-card {
      border: none; border-radius: 20px;
      box-shadow: 0 25px 70px rgba(0,0,0,.5);
      overflow: hidden;
    }
    .card-body { padding: 40px 36px; }
    .brand-icon {
      width: 60px; height: 60px; background: var(--gold); border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 1.8rem; color: #000; margin: 0 auto 14px;
    }
    .brand-title { color: var(--gold); font-weight: 800; font-size: 1.9rem; }
    .btn-login {
      background: var(--gold); border: none; color: #000;
      font-weight: 700; padding: 14px; font-size: 1rem;
      border-radius: 10px; width: 100%; min-height: 48px;
    }
    .btn-login:hover { background: var(--gold-dark); color: #000; }
    .form-control {
      font-size: 16px; border-radius: 10px; padding: 12px 14px;
      min-height: 48px;
    }
    .form-control:focus { border-color: var(--gold); box-shadow: 0 0 0 .2rem rgba(240,165,0,.2); }
    .divider { height: 1px; background: #e8e8e8; margin: 20px 0; }
    .contact-badge {
      background: rgba(240,165,0,.08); border: 1px solid rgba(240,165,0,.25);
      border-radius: 10px; padding: 12px;
    }
    @media (max-width: 480px) {
      .login-card { border-radius: 16px; }
      .card-body { padding: 28px 20px; }
    }
  </style>
</head>
<body>
<div class="login-wrapper">
  <div class="login-card card">
    <div class="card-body">
      <div class="text-center mb-4">
        <div class="brand-icon">Y</div>
        <div class="brand-title">YGC Internal</div>
        <p class="text-muted small mb-0">Save Rupee, Rupee Will Save You In Future</p>
      </div>

      <div th:if="${error}"   class="alert alert-danger py-2 small"><i class="bi bi-exclamation-circle me-2"></i><span th:text="${error}"></span></div>
      <div th:if="${message}" class="alert alert-success py-2 small"><i class="bi bi-check-circle me-2"></i><span th:text="${message}"></span></div>

      <form th:action="@{/login}" method="post" autocomplete="on">
        <div class="mb-3">
          <label class="form-label fw-semibold text-muted" style="font-size:.8rem;letter-spacing:.05em">EMAIL ADDRESS</label>
          <input type="email" name="username" class="form-control" placeholder="you@example.com"
                 required autofocus autocomplete="username" inputmode="email">
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold text-muted" style="font-size:.8rem;letter-spacing:.05em">PASSWORD</label>
          <input type="password" name="password" class="form-control" placeholder="••••••••"
                 required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-login">
          <i class="bi bi-box-arrow-in-right me-2"></i>Login to YGC
        </button>
      </form>

      <div class="divider"></div>

      <p class="text-center mb-3 text-muted small">
        New member? <a th:href="@{/register}" class="fw-bold text-warning">Register here</a>
      </p>
      <p class="text-center mb-3">
        <a th:href="@{/terms}" class="text-muted small">View Terms &amp; Conditions</a>
      </p>

      <div class="contact-badge text-center">
        <small class="text-muted d-block mb-1">Need help? Contact Admin</small>
        <a href="tel:+918919508889" class="fw-bold text-warning text-decoration-none">
          <i class="bi bi-telephone me-1"></i>+91 8919508889
        </a>
      </div>
    </div>
  </div>
  <p class="text-center mt-3 text-white-50 small">YGC Internal Chit Management v2.0</p>
</div>

<div th:replace="~{fragments :: appScripts}"></div>
</body>
</html>
