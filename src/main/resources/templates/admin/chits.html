<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Chit Groups')}"></head>
<body>
<div th:replace="~{fragments :: adminSidebar('chits')}"></div>
<button id="ygc-mob-toggle" aria-label="Toggle menu"><i class="bi bi-list"></i></button>
<div class="main-content">
    <div th:replace="~{fragments :: topbar('Chit Groups', 'Create and manage chit fund groups', ${user.fullName})}"></div>
    <div th:replace="~{fragments :: alerts}"></div>

    <!-- Quick action bar -->
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <div class="d-flex gap-2">
            <a th:href="@{/admin/chits/create}" class="btn btn-warning fw-bold"><i class="bi bi-plus-circle me-1"></i>New Chit</a>
            <a th:href="@{/admin/reports/chits/pdf}" class="btn btn-sm btn-outline-secondary" title="Export PDF">
                <i class="bi bi-file-earmark-pdf me-1"></i><span class="btn-action-text">Export PDF</span>
            </a>
        </div>
        <span class="badge bg-secondary" th:text="${chits.size()} + ' chit groups'"></span>
    </div>

    <div class="card panel">
        <div class="card-body p-0">
            <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr><th>Chit Name</th><th>Monthly</th><th>Total Value</th><th class="hide-mobile">Members</th><th class="hide-mobile">Duration</th><th class="hide-mobile">Start Date</th><th>Status</th><th>Actions</th></tr>
                </thead>
                <tbody>
                <tr th:each="chit : ${chits}"
                    style="cursor:pointer"
                    th:onclick="'window.location.href=\'/admin/chits/' + ${chit.id} + '\''">
                    <td>
                        <div class="fw-semibold" th:text="${chit.name}"></div>
                        <small class="text-muted" th:text="${chit.description}"></small>
                    </td>
                    <td class="fw-bold text-success" th:text="'₹' + ${chit.monthlyAmount}"></td>
                    <td th:text="'₹' + ${chit.totalChitValue}"></td>
                    <td class="hide-mobile" th:text="${chit.totalMembers}"></td>
                    <td class="hide-mobile" th:text="${chit.durationMonths} + ' mo'"></td>
                    <td class="hide-mobile" th:text="${chit.startDate}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${chit.status.name() == 'ACTIVE'} ? 'bg-success' : (${chit.status.name() == 'OPEN'} ? 'bg-primary' : (${chit.status.name() == 'COMPLETED'} ? 'bg-secondary' : 'bg-warning text-dark'))"
                              th:text="${chit.status}"></span>
                    </td>
                    <td onclick="event.stopPropagation()">
                        <div class="d-flex gap-1">
                            <a th:href="@{/admin/chits/{id}(id=${chit.id})}" class="btn btn-sm btn-outline-primary" title="View Details">
                                <i class="bi bi-eye"></i>
                            </a>
                            <a th:href="@{/admin/chits/{id}/edit(id=${chit.id})}" class="btn btn-sm btn-outline-secondary" title="Edit">
                                <i class="bi bi-pencil"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(chits)}">
                    <td colspan="8" class="text-center text-muted py-4">
                        <i class="bi bi-collection fs-3 d-block mb-2"></i>No chit groups yet.
                        <a th:href="@{/admin/chits/create}" class="text-warning">Create the first one!</a>
                    </td>
                </tr>
                </tbody>
            </table>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments :: appScripts}"></div>
</body></html>
