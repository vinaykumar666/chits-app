<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Approve Payment')}"></head>
<body>
<div th:replace="~{fragments :: adminSidebar('payments')}"></div>
<button id="ygc-mob-toggle" aria-label="Toggle menu"><i class="bi bi-list"></i></button>
<div class="main-content">
    <div th:replace="~{fragments :: topbar('Approve Payment', 'Review payment proof and approve or reject', ${user.fullName})}"></div>
    <div th:replace="~{fragments :: alerts}"></div>

    <div class="card panel">
        <div class="card-header"><i class="bi bi-cash-coin text-warning me-2"></i>Payment Details</div>
        <div class="card-body">
            <div class="row g-4">
                <!-- Payment Info -->
                <div class="col-md-6">
                    <table class="table table-sm">
                        <tr><td class="text-muted">Member</td><td class="fw-semibold" th:text="${payment.membership.user.fullName}"></td></tr>
                        <tr><td class="text-muted">Email</td><td th:text="${payment.membership.user.email}"></td></tr>
                        <tr><td class="text-muted">Chit</td><td th:text="${payment.membership.chit.name}"></td></tr>
                        <tr><td class="text-muted">Month</td><td><span class="badge bg-primary" th:text="'Month ' + ${payment.monthNumber}"></span></td></tr>
                        <tr><td class="text-muted">Amount</td><td class="fw-bold" th:text="'₹' + ${payment.amount}"></td></tr>
                        <tr><td class="text-muted">Late Fine</td><td th:classappend="${payment.lateFine.compareTo(T(java.math.BigDecimal).ZERO) > 0} ? 'text-danger fw-bold' : ''" th:text="'₹' + ${payment.lateFine}"></td></tr>
                        <tr><td class="text-muted">Total</td><td class="fw-bold text-success fs-5" th:text="'₹' + ${payment.totalAmount}"></td></tr>
                        <tr><td class="text-muted">Paid Date</td><td th:text="${payment.paidDate}"></td></tr>
                        <tr><td class="text-muted">Status</td><td><span class="badge bg-warning text-dark" th:text="${payment.status}"></span></td></tr>
                    </table>
                </div>

                <!-- Issue 8: Screenshot Preview -->
                <div class="col-md-6">
                    <div th:if="${payment.screenshotPath != null and payment.screenshotPath != 'N/A'}">
                        <label class="form-label fw-semibold"><i class="bi bi-image me-1"></i>Payment Proof</label>
                        <div class="border rounded p-2 text-center bg-light">
                            <img id="proofImg" alt="Payment Proof"
                                 style="max-width:100%;max-height:400px;border-radius:8px;cursor:pointer"
                                 onclick="this.classList.toggle('img-enlarged')"
                                 th:src="@{/admin/payments/{id}/view-screenshot(id=${payment.id})}">
                        </div>
                        <small class="text-muted mt-1 d-block"><i class="bi bi-info-circle me-1"></i>Click image to enlarge</small>
                    </div>
                    <div th:if="${payment.screenshotPath == null or payment.screenshotPath == 'N/A'}"
                         class="alert alert-warning py-3 text-center">
                        <i class="bi bi-exclamation-triangle fs-4 d-block mb-2"></i>
                        No payment proof uploaded
                    </div>
                </div>
            </div>

            <!-- Approval Form -->
            <hr class="my-4">
            <form th:action="@{/admin/payments/{id}/approve(id=${payment.id})}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Admin Remarks</label>
                    <textarea name="remarks" class="form-control" rows="2" placeholder="Optional approval notes...">Approved</textarea>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success fw-bold px-4" onclick="return confirm('Approve this payment?')">
                        <i class="bi bi-check-circle me-1"></i>Approve Payment
                    </button>
                    <a th:href="@{/admin/payments}" class="btn btn-outline-secondary">Back to Payments</a>
                </div>
            </form>
        </div>
    </div>
</div>
<style>.img-enlarged{max-height:90vh!important;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;background:white;padding:8px;box-shadow:0 0 60px rgba(0,0,0,.5)}</style>
<div th:replace="~{fragments :: appScripts}"></div>
</body></html>
