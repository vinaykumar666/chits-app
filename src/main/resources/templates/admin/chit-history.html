<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Chit History')}"></head>
<body>
<div th:replace="~{fragments :: adminSidebar('history')}"></div>
<button id="ygc-mob-toggle" aria-label="Toggle menu"><i class="bi bi-list"></i></button>

<div class="main-content">
    <div class="topbar">
        <div>
            <h4>Closed Chit History</h4>
            <div class="sub">Records of all archived, cancelled, completed, and deleted chits</div>
        </div>
        <div class="d-flex align-items-center gap-2">
            <span class="ygc-conn-dot"></span>
            <button id="ygc-bell-btn" class="btn btn-link p-0 position-relative text-secondary" style="font-size:1.3rem;line-height:1">
                <i class="bi bi-bell"></i>
                <span id="ygc-notif-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size:.6rem;display:none"></span>
            </button>
            <span class="user-badge" th:text="${user.fullName}">Admin</span>
        </div>
    </div>
    <div th:replace="~{fragments :: alerts}"></div>

    <!-- Stats -->
    <div class="row g-3 mb-4">
        <div class="col-md-3 col-6">
            <div class="card stat-card h-100"><div class="card-body d-flex align-items-center gap-3">
                <div class="stat-icon bg-secondary bg-opacity-10 text-secondary"><i class="bi bi-archive"></i></div>
                <div><div class="fw-bold fs-5" th:text="${histories.size()}">0</div><small class="text-muted">Total Archived</small></div>
            </div></div>
        </div>
        <div class="col-md-3 col-6">
            <div class="card stat-card h-100"><div class="card-body d-flex align-items-center gap-3">
                <div class="stat-icon bg-danger bg-opacity-10 text-danger"><i class="bi bi-trash3"></i></div>
                <div><div class="fw-bold fs-5" th:text="${deletedCount}">0</div><small class="text-muted">Deleted</small></div>
            </div></div>
        </div>
        <div class="col-md-3 col-6">
            <div class="card stat-card h-100"><div class="card-body d-flex align-items-center gap-3">
                <div class="stat-icon bg-warning bg-opacity-10 text-warning"><i class="bi bi-x-circle"></i></div>
                <div><div class="fw-bold fs-5" th:text="${cancelledCount}">0</div><small class="text-muted">Cancelled</small></div>
            </div></div>
        </div>
        <div class="col-md-3 col-6">
            <div class="card stat-card h-100"><div class="card-body d-flex align-items-center gap-3">
                <div class="stat-icon bg-success bg-opacity-10 text-success"><i class="bi bi-check-circle"></i></div>
                <div><div class="fw-bold fs-5" th:text="${completedCount}">0</div><small class="text-muted">Completed</small></div>
            </div></div>
        </div>
    </div>

    <!-- Table -->
    <div class="card panel">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span><i class="bi bi-clock-history me-2 text-warning"></i>All Archived Records</span>
            <small class="text-muted" th:text="${histories.size()} + ' records'"></small>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr><th>#</th><th>Chit Name</th><th>Status</th><th class="hide-mobile">Reason</th><th class="hide-mobile">Closed By</th><th>Date</th><th>Actions</th></tr>
                </thead>
                <tbody>
                <tr th:each="h, idx : ${histories}">
                    <td th:text="${idx.count}"></td>
                    <td><div class="fw-semibold" th:text="${h.chitName}"></div></td>
                    <td><span class="badge" th:classappend="${h.finalStatus == 'DELETED'} ? 'bg-danger' : (${h.finalStatus == 'COMPLETED'} ? 'bg-success' : 'bg-warning text-dark')" th:text="${h.finalStatus}"></span></td>
                    <td class="hide-mobile"><small class="text-muted" th:text="${h.closingReason != null ? h.closingReason : '—'}"></small></td>
                    <td class="hide-mobile" th:text="${h.closedByName}"></td>
                    <td><small th:text="${h.closedAt != null ? #temporals.format(h.closedAt, 'dd MMM yyyy') : '—'}"></small></td>
                    <td>
                        <a th:href="@{/admin/chit-history/{id}/pdf(id=${h.id})}" class="btn btn-sm btn-outline-danger" target="_blank" title="PDF"><i class="bi bi-file-earmark-pdf"></i></a>
                        <a th:href="@{/admin/chit-history/{id}/json(id=${h.id})}" class="btn btn-sm btn-outline-secondary" target="_blank" title="JSON"><i class="bi bi-braces"></i></a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(histories)}">
                    <td colspan="7" class="text-center text-muted py-5"><i class="bi bi-archive fs-1 d-block mb-2 opacity-25"></i>No archived chits yet.</td>
                </tr>
                </tbody>
            </table>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: appScripts}"></div>
</body>
</html>
