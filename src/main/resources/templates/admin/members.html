<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Members')}"></head>
<body>
<div th:replace="~{fragments :: adminSidebar('members')}"></div>
<button id="ygc-mob-toggle" aria-label="Toggle menu"><i class="bi bi-list"></i></button>

<div class="main-content">
    <div th:replace="~{fragments :: topbar('👥 Member Management', 'View and manage all registered users', ${user.fullName})}"></div>
    <div th:replace="~{fragments :: alerts}"></div>

    <!-- Add Member Card -->
    <div class="card panel mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span><i class="bi bi-person-plus-fill me-2 text-success"></i>Add New Member</span>
            <button class="btn btn-sm btn-outline-warning" type="button" data-bs-toggle="collapse" data-bs-target="#addMemberForm">
                <i class="bi bi-plus-lg"></i> <span class="btn-action-text">New Member</span>
            </button>
        </div>
        <div class="collapse" id="addMemberForm">
            <div class="card-body">
                <form th:action="@{/admin/members/create}" method="post">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label fw-semibold small text-muted">EMAIL *</label>
                            <input type="email" name="email" class="form-control" placeholder="user@example.com" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold small text-muted">FULL NAME *</label>
                            <input type="text" name="fullName" class="form-control" placeholder="Full Name" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label fw-semibold small text-muted">PHONE</label>
                            <input type="tel" name="phone" class="form-control" placeholder="+91 XXXXXXXXXX">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold small text-muted">ADDRESS</label>
                            <input type="text" name="address" class="form-control" placeholder="City, State">
                        </div>
                        <div class="col-md-1 d-flex align-items-end">
                            <button type="submit" class="btn btn-warning w-100 fw-bold"><i class="bi bi-check-lg"></i></button>
                        </div>
                    </div>
                    <small class="text-muted mt-2 d-block">A temporary password will be emailed to the new member automatically.</small>
                </form>
            </div>
        </div>
    </div>

    <!-- Members Table -->
    <div class="card panel">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span><i class="bi bi-people me-2"></i>All Registered Users</span>
            <a th:href="@{/admin/reports/members/pdf}" class="btn btn-sm btn-outline-warning fw-bold" title="Export PDF">
                <i class="bi bi-file-earmark-pdf me-1"></i><span class="btn-action-text">Export PDF</span>
            </a>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr><th>#</th><th>Full Name</th><th>Email</th><th class="hide-mobile">Phone</th><th>Role</th><th>Status</th><th class="hide-mobile">First Login</th><th class="hide-mobile">Joined</th><th>Actions</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="member,idx : ${members}" style="cursor:pointer"
                            th:onclick="'window.location.href=\'/admin/members/' + ${member.id} + '/edit\''">
                            <td th:text="${idx.count}"></td>
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <div class="rounded-circle bg-warning text-dark d-flex align-items-center justify-content-center fw-bold"
                                         style="width:32px;height:32px;font-size:.8rem" th:text="${#strings.substring(member.fullName,0,1)}">A</div>
                                    <span th:text="${member.fullName}"></span>
                                </div>
                            </td>
                            <td th:text="${member.email}"></td>
                            <td class="hide-mobile" th:text="${member.phone != null ? member.phone : '-'}"></td>
                            <td><span class="badge" th:classappend="${member.role.name() == 'ADMIN'} ? 'bg-danger' : 'bg-primary'" th:text="${member.role}"></span></td>
                            <td><span class="badge" th:classappend="${member.active} ? 'bg-success' : 'bg-secondary'" th:text="${member.active} ? 'Active' : 'Inactive'"></span></td>
                            <td class="hide-mobile">
                                <span class="badge" th:classappend="${member.firstLogin} ? 'bg-warning text-dark' : 'bg-success'"
                                      th:text="${member.firstLogin} ? 'Pending' : 'Done'"></span>
                            </td>
                            <td class="hide-mobile" th:text="${#temporals.format(member.createdAt, 'dd MMM yyyy')}"></td>
                            <td>
                                <div class="d-flex gap-1 flex-wrap">
                                    <a th:href="@{/admin/members/{id}/edit(id=${member.id})}" class="btn btn-sm btn-outline-primary" title="Edit"><i class="bi bi-pencil"></i></a>
                                    <form th:action="@{/admin/members/{id}/toggle-status(id=${member.id})}" method="post" class="d-inline">
                                        <button type="submit" class="btn btn-sm"
                                                th:classappend="${member.active} ? 'btn-outline-danger' : 'btn-outline-success'"
                                                th:title="${member.active} ? 'Deactivate' : 'Activate'">
                                            <i class="bi" th:classappend="${member.active} ? 'bi-toggle-on' : 'bi-toggle-off'"></i>
                                        </button>
                                    </form>
                                    <form th:action="@{/admin/members/{id}/reset-password(id=${member.id})}" method="post" class="d-inline"
                                          th:attr="onsubmit=|return confirm('Reset password for ' + ${member.fullName} + '?')|">
                                        <button type="submit" class="btn btn-sm btn-outline-warning" title="Reset Password"><i class="bi bi-key"></i></button>
                                    </form>
                                    <form th:if="${member.role.name() != 'ADMIN'}"
                                          th:action="@{/admin/members/{id}/delete(id=${member.id})}" method="post" class="d-inline"
                                          th:attr="onsubmit=|return confirm('PERMANENTLY DELETE ' + ${member.fullName} + '? This cannot be undone.')|">
                                        <input type="hidden" name="reason" value="Removed by admin">
                                        <button type="submit" class="btn btn-sm btn-outline-danger" title="Delete User"><i class="bi bi-trash3"></i></button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(members)}"><td colspan="9" class="text-center text-muted py-4">No members registered</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: appScripts}"></div>
</body>
</html>
