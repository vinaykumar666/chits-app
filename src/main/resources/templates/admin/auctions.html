<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Auctions')}"></head>
<body>
<div th:replace="~{fragments :: adminSidebar('auctions')}"></div>
<button class="ygc-mob-toggle-btn" id="ygc-mob-toggle" aria-label="Toggle menu"><i class="bi bi-list"></i></button>

<div class="main-content">
    <div th:replace="~{fragments :: topbar('Auction Management', 'Announce, open, close auctions and release payouts', ${user.fullName})}"></div>
    <div th:replace="~{fragments :: alerts}"></div>

    <div class="alert alert-info mb-4" style="border-radius:10px;border:none;background:linear-gradient(135deg,#e8f4fd,#f0f7ff);border-left:4px solid #0d6efd">
        <strong>Lifecycle:</strong>
        <span class="badge bg-info text-dark ms-2">ANNOUNCED</span> →
        <span class="badge bg-success ms-1">OPEN</span> →
        <span class="badge bg-secondary ms-1">CLOSED</span> →
        <span class="badge bg-primary ms-1">COMPLETED</span>
    </div>

    <div class="card panel mb-4">
        <div class="card-header"><i class="bi bi-megaphone text-primary me-2"></i>Announce New Auction</div>
        <div class="card-body">
            <form th:action="@{/admin/auctions/create}" method="post" class="row g-3">
                <div class="col-md-4">
                    <label class="form-label fw-semibold small text-muted">CHIT GROUP</label>
                    <select name="chitId" class="form-select" required>
                        <option value="">-- Select Chit --</option>
                        <option th:each="chit : ${chits}" th:value="${chit.id}" th:text="${chit.name + ' (₹' + chit.monthlyAmount + '/mo)'}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold small text-muted">MONTH NUMBER</label>
                    <input type="number" name="monthNumber" class="form-control" min="1" placeholder="e.g. 1" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold small text-muted">AUCTION DATE</label>
                    <input type="date" name="auctionDate" class="form-control" required>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-warning fw-bold w-100"><i class="bi bi-megaphone me-1"></i><span class="btn-action-text">Announce</span></button>
                </div>
            </form>
        </div>
    </div>

    <div th:if="${!#lists.isEmpty(openAuctions)}" class="mb-4">
        <h6 class="text-muted mb-3" style="font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;font-weight:700"><i class="bi bi-calculator-fill me-2"></i>Bid Recommendations — Open Auctions</h6>
        <div class="row g-3">
            <div class="col-md-6" th:each="auction : ${openAuctions}">
                <div class="card stat-card h-100" th:with="recs=${bidRecommendations[auction.id]}">
                    <div class="card-header bg-success bg-opacity-10 d-flex align-items-center gap-2 py-2" style="border-radius:14px 14px 0 0">
                        <i class="bi bi-hammer text-success"></i>
                        <strong th:text="${auction.chit.name}"></strong>
                        <span class="badge bg-primary ms-auto">Month <span th:text="${auction.monthNumber}"></span></span>
                    </div>
                    <div class="card-body py-3" th:if="${recs != null}">
                        <div class="row g-2 text-center mb-3">
                            <div class="col-4"><div class="text-muted" style="font-size:.72rem">Min Bid</div><div class="fw-bold text-success">₹<span th:text="${recs.recommendedMinBid}"></span></div></div>
                            <div class="col-4"><div class="text-muted" style="font-size:.72rem">Max Bid</div><div class="fw-bold text-warning">₹<span th:text="${recs.recommendedMaxBid}"></span></div></div>
                            <div class="col-4"><div class="text-muted" style="font-size:.72rem">Est. Payout</div><div class="fw-bold text-primary">₹<span th:text="${recs.estimatedPayout}"></span></div></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card panel">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span><i class="bi bi-list-check me-2"></i>All Auctions</span>
            <span class="badge bg-secondary" th:text="${allAuctions.size()} + ' total'"></span>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr><th>Chit</th><th>Month</th><th class="hide-mobile">Date</th><th>Status</th><th class="hide-mobile">Bids</th><th class="hide-mobile">Winner</th><th class="hide-mobile">Payout</th><th>Actions</th></tr>
                </thead>
                <tbody>
                <tr th:each="auction : ${allAuctions}">
                    <td class="fw-semibold" th:text="${auction.chit.name}"></td>
                    <td><span class="badge bg-primary" th:text="'M' + ${auction.monthNumber}"></span></td>
                    <td class="hide-mobile" th:text="${auction.auctionDate}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${auction.status.name() == 'OPEN'} ? 'bg-success' : (${auction.status.name() == 'CLOSED'} ? 'bg-secondary' : (${auction.status.name() == 'COMPLETED'} ? 'bg-primary' : 'bg-info text-dark'))"
                              th:text="${auction.status}"></span>
                    </td>
                    <td class="hide-mobile" th:text="${auction.bids != null ? auction.bids.size() : 0} + ' bids'"></td>
                    <td class="hide-mobile" th:text="${auction.winner != null ? auction.winner.fullName : '-'}"></td>
                    <td class="hide-mobile" th:text="${auction.lumpSumPayout != null ? '₹' + auction.lumpSumPayout : '-'}"></td>
                    <td>
                        <div class="d-flex gap-1 flex-wrap">
                            <form th:if="${auction.status.name() == 'ANNOUNCED'}" th:action="@{/admin/auctions/{id}/open(id=${auction.id})}" method="post" class="d-inline">
                                <button class="btn btn-sm btn-success fw-bold"><i class="bi bi-play"></i><span class="btn-action-text"> Open</span></button>
                            </form>
                            <form th:if="${auction.status.name() == 'OPEN'}" th:action="@{/admin/auctions/{id}/close(id=${auction.id})}" method="post" class="d-inline">
                                <button class="btn btn-sm btn-warning fw-bold"><i class="bi bi-stop"></i><span class="btn-action-text"> Close</span></button>
                            </form>
                            <form th:if="${auction.status.name() == 'CLOSED' and auction.winner != null and !auction.payoutReleased}" th:action="@{/admin/auctions/{id}/release-payout(id=${auction.id})}" method="post" class="d-inline">
                                <button class="btn btn-sm btn-primary fw-bold"><i class="bi bi-send"></i><span class="btn-action-text"> Payout</span></button>
                            </form>
                            <span th:if="${auction.status.name() == 'COMPLETED'}" class="text-success small"><i class="bi bi-check-all"></i></span>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(allAuctions)}">
                    <td colspan="8" class="text-center text-muted py-4">No auctions yet. Announce one above.</td>
                </tr>
                </tbody>
            </table>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments :: appScripts}"></div>
</body></html>
