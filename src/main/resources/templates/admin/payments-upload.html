<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Payment - YGC Internal</title>
    <link rel="stylesheet" th:href="@{/css/responsive.css}">
</head>
<body>
<div class="container mt-2">
    <h1>Upload Manual Payment</h1>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card">
        <form method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label>Select Member & Chit</label>
                <select name="membershipId" required>
                    <option value="">-- Choose Member --</option>
                    <option th:each="m : ${memberships}" th:value="${m.id}"
                            th:text="${m.user.fullName} + ' - ' + ${m.chit.name}"></option>
                </select>
            </div>

            <div class="form-group">
                <label>Month Number</label>
                <input type="number" name="monthNumber" min="1" max="50" required>
            </div>

            <div class="form-group">
                <label>Amount (₹)</label>
                <input type="number" name="amount" step="0.01" required>
            </div>

            <div class="form-group">
                <label>Payment Screenshot</label>
                <input type="file" name="screenshot" accept="image/*">
            </div>

            <button type="submit" class="btn btn-primary">💾 Upload Payment</button>
        </form>
    </div>
</div>
</body>
</html>
