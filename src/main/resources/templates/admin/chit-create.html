<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Create Chit')}"></head>
<body>
<div th:replace="~{fragments :: adminSidebar('chits')}"></div>
<button id="ygc-mob-toggle" aria-label="Toggle menu"><i class="bi bi-list"></i></button>
<div class="main-content">
    <div class="topbar">
        <div>
            <a th:href="@{/admin/chits}" class="text-muted text-decoration-none small"><i class="bi bi-arrow-left"></i> Back to Chits</a>
            <h4 class="mt-1"><i class="bi bi-plus-circle text-warning me-2"></i>Create New Chit Group</h4>
        </div>
        <div class="d-flex align-items-center gap-2">
            <span class="ygc-conn-dot" title="Live notifications active"></span>
            <button id="ygc-bell-btn" class="btn btn-link p-0 position-relative text-secondary" title="Notifications" aria-label="Show notifications" style="font-size:1.3rem;line-height:1">
              <i class="bi bi-bell"></i>
              <span id="ygc-notif-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size:.6rem;display:none"></span>
            </button>
            <div class="user-badge" th:text="${user.fullName}">Admin</div>
        </div>
    </div>

    <div class="card panel">
        <div class="card-header"><i class="bi bi-collection me-2"></i>Chit Group Configuration</div>
        <div class="card-body">
            <form th:action="@{/admin/chits/create}" method="post">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Chit Group Name <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control" placeholder="e.g. Gold Savings Chit 2024" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Description</label>
                        <input type="text" name="description" class="form-control" placeholder="Short description for members">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-semibold">Monthly Amount (₹) <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text">₹</span>
                            <input type="number" name="monthlyAmount" class="form-control" placeholder="5000" min="1" required>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-semibold">Total Members <span class="text-danger">*</span></label>
                        <input type="number" name="totalMembers" class="form-control" placeholder="10" min="2" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-semibold">Duration (Months) <span class="text-danger">*</span></label>
                        <input type="number" name="durationMonths" class="form-control" placeholder="12" min="1" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-semibold">Start Date <span class="text-danger">*</span></label>
                        <input type="date" name="startDate" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Admin Commission (%) <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <input type="number" name="adminCommissionPercentage" class="form-control" placeholder="5" min="0" max="30" step="0.01" value="5" required>
                            <span class="input-group-text">%</span>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Minimum Bid Amount (₹)</label>
                        <div class="input-group">
                            <span class="input-group-text">₹</span>
                            <input type="number" name="minBidAmount" class="form-control" placeholder="Optional">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Maximum Bid Amount (₹)</label>
                        <div class="input-group">
                            <span class="input-group-text">₹</span>
                            <input type="number" name="maxBidAmount" class="form-control" placeholder="Optional">
                        </div>
                    </div>

                    <div class="col-12">
                        <div class="alert alert-light border">
                            <i class="bi bi-calculator me-2 text-warning"></i>
                            <strong>Auto-calculated:</strong> Total Chit Value = Monthly Amount × Total Members. End Date = Start Date + Duration months.
                        </div>
                    </div>

                    <div class="col-12 d-flex gap-2">
                        <button type="submit" class="btn btn-warning fw-bold px-4"><i class="bi bi-plus-circle me-2"></i>Create Chit Group</button>
                        <a th:href="@{/admin/chits}" class="btn btn-outline-secondary px-4">Cancel</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
<div th:replace="~{fragments :: appScripts}"></div>
</body></html>
