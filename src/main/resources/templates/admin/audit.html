<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Audit Log')}"></head>
<body>
<div th:replace="~{fragments :: adminSidebar('audit')}"></div>
<button id="ygc-mob-toggle" aria-label="Toggle menu"><i class="bi bi-list"></i></button>

<div class="main-content">
    <div th:replace="~{fragments :: topbar('Audit Log', 'Complete immutable activity trail', ${user.fullName})}"></div>

    <!-- Search & Filter Bar -->
    <div class="card panel mb-4">
        <div class="card-body py-3">
            <div class="row g-2 align-items-end">
                <div class="col-md-4">
                    <label class="form-label fw-semibold small text-muted">SEARCH</label>
                    <input type="text" id="auditSearch" class="form-control" placeholder="Search action, user, description..." oninput="filterAudit()">
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-semibold small text-muted">ACTION</label>
                    <select id="auditActionFilter" class="form-select" onchange="filterAudit()">
                        <option value="">All Actions</option>
                        <option value="CREATE">Create</option>
                        <option value="APPROVE">Approve</option>
                        <option value="REJECT">Reject</option>
                        <option value="DELETE">Delete</option>
                        <option value="LOGIN">Login</option>
                        <option value="PAYMENT">Payment</option>
                        <option value="AUCTION">Auction</option>
                        <option value="BID">Bid</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-semibold small text-muted">FROM</label>
                    <input type="date" id="auditDateFrom" class="form-control" onchange="filterAudit()">
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-semibold small text-muted">TO</label>
                    <input type="date" id="auditDateTo" class="form-control" onchange="filterAudit()">
                </div>
                <div class="col-md-2 d-flex gap-2">
                    <button class="btn btn-outline-secondary w-100" onclick="resetFilters()"><i class="bi bi-arrow-counterclockwise"></i> Reset</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Audit Table -->
    <div class="card panel">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span><i class="bi bi-shield-check me-2"></i>Activity Log</span>
            <div class="d-flex align-items-center gap-2">
                <a th:href="@{/admin/audit/export(format=excel)}" class="btn btn-sm btn-outline-success" title="Export CSV"><i class="bi bi-file-earmark-spreadsheet"></i></a>
                <span id="auditCount" class="badge bg-secondary" th:text="${auditLogs.size()} + ' records'"></span>
                <select id="pageSize" class="form-select form-select-sm" style="width:auto" onchange="filterAudit()">
                    <option value="25">25/page</option>
                    <option value="50">50/page</option>
                    <option value="100">100/page</option>
                    <option value="9999">All</option>
                </select>
            </div>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
            <table class="table table-hover mb-0" id="auditTable">
                <thead class="table-light">
                <tr>
                    <th style="cursor:pointer" onclick="sortAudit('date')">Time <i class="bi bi-arrow-down-up" style="font-size:.7rem"></i></th>
                    <th>User</th>
                    <th style="cursor:pointer" onclick="sortAudit('action')">Action <i class="bi bi-arrow-down-up" style="font-size:.7rem"></i></th>
                    <th class="hide-mobile">Entity</th>
                    <th class="hide-mobile">IP</th>
                    <th>Description</th>
                </tr>
                </thead>
                <tbody id="auditBody">
                <tr th:each="log : ${auditLogs}" class="audit-row"
                    th:data-action="${log.action}"
                    th:data-date="${#temporals.format(log.timestamp, 'yyyy-MM-dd')}">
                    <td><small th:text="${#temporals.format(log.timestamp, 'dd MMM yyyy HH:mm')}"></small></td>
                    <td>
                        <div th:if="${log.user != null}">
                            <div class="fw-semibold small" th:text="${log.user.fullName}"></div>
                            <small class="text-muted" th:text="${log.user.email}"></small>
                        </div>
                        <span th:if="${log.user == null}" class="text-muted small">System</span>
                    </td>
                    <td>
                        <span class="badge"
                              th:classappend="${log.action.contains('APPROVE')} ? 'bg-success' : (${log.action.contains('REJECT')} ? 'bg-danger' : (${log.action.contains('CREATE')} ? 'bg-primary' : (${log.action.contains('DELETE')} ? 'bg-danger' : 'bg-secondary')))"
                              th:text="${log.action}"></span>
                    </td>
                    <td class="hide-mobile"><small th:text="${log.entityType}"></small></td>
                    <td class="hide-mobile"><code style="font-size:.75rem;color:#6b7280" th:text="${log.ipAddress != null ? log.ipAddress : '—'}"></code></td>
                    <td><small th:text="${log.description}"></small></td>
                </tr>
                <tr th:if="${#lists.isEmpty(auditLogs)}"><td colspan="6" class="text-center text-muted py-4">No audit records yet</td></tr>
                </tbody>
            </table>
            </div>
        </div>
        <!-- Pagination -->
        <div class="card-footer d-flex justify-content-between align-items-center py-2" id="auditPagination">
            <small class="text-muted" id="pageInfo">Showing 1-25</small>
            <div class="d-flex gap-1">
                <button class="btn btn-sm btn-outline-secondary" id="prevPage" onclick="changePage(-1)"><i class="bi bi-chevron-left"></i></button>
                <button class="btn btn-sm btn-outline-secondary" id="nextPage" onclick="changePage(1)"><i class="bi bi-chevron-right"></i></button>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: appScripts}"></div>
<script>
var currentPage = 0;
var sortField = null;
var sortAsc = true;
function filterAudit() {
    currentPage = 0;
    applyFilter();
}
function resetFilters() {
    document.getElementById('auditSearch').value = '';
    document.getElementById('auditActionFilter').value = '';
    document.getElementById('auditDateFrom').value = '';
    document.getElementById('auditDateTo').value = '';
    currentPage = 0;
    sortField = null;
    applyFilter();
}
function sortAudit(field) {
    if (sortField === field) { sortAsc = !sortAsc; }
    else { sortField = field; sortAsc = true; }
    applyFilter();
}
function changePage(dir) {
    currentPage += dir;
    if (currentPage < 0) currentPage = 0;
    applyFilter();
}
function applyFilter() {
    var search = (document.getElementById('auditSearch').value || '').toLowerCase();
    var action = document.getElementById('auditActionFilter').value;
    var dateFrom = document.getElementById('auditDateFrom').value;
    var dateTo = document.getElementById('auditDateTo').value;
    var pageSize = parseInt(document.getElementById('pageSize').value) || 25;

    var rows = document.querySelectorAll('.audit-row');
    var visible = [];

    rows.forEach(function(row) {
        var text = row.textContent.toLowerCase();
        var rowAction = row.getAttribute('data-action') || '';
        var rowDate = row.getAttribute('data-date') || '';

        var matchSearch = !search || text.indexOf(search) >= 0;
        var matchAction = !action || rowAction.indexOf(action) >= 0;
        var matchFrom = !dateFrom || rowDate >= dateFrom;
        var matchTo = !dateTo || rowDate <= dateTo;

        if (matchSearch && matchAction && matchFrom && matchTo) {
            visible.push(row);
        }
        row.style.display = 'none';
    });

    // Issue 7: Sort visible rows
    if (sortField) {
        visible.sort(function(a, b) {
            var av, bv;
            if (sortField === 'date') {
                av = a.getAttribute('data-date') || '';
                bv = b.getAttribute('data-date') || '';
            } else if (sortField === 'action') {
                av = (a.getAttribute('data-action') || '').toLowerCase();
                bv = (b.getAttribute('data-action') || '').toLowerCase();
            }
            var cmp = av < bv ? -1 : (av > bv ? 1 : 0);
            return sortAsc ? cmp : -cmp;
        });
        var tbody = document.getElementById('auditBody');
        visible.forEach(function(row) { tbody.appendChild(row); });
    }

    var totalPages = Math.ceil(visible.length / pageSize);
    if (currentPage >= totalPages) currentPage = Math.max(0, totalPages - 1);
    var start = currentPage * pageSize;
    var end = Math.min(start + pageSize, visible.length);

    for (var i = start; i < end; i++) {
        visible[i].style.display = '';
    }

    document.getElementById('auditCount').textContent = visible.length + ' matching';
    document.getElementById('pageInfo').textContent = visible.length > 0
        ? 'Showing ' + (start+1) + '-' + end + ' of ' + visible.length
        : 'No results';
    document.getElementById('prevPage').disabled = currentPage <= 0;
    document.getElementById('nextPage').disabled = currentPage >= totalPages - 1;
}
// Initial filter
document.addEventListener('DOMContentLoaded', function() { applyFilter(); });
</script>
</body>
</html>
