<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Member Profile')}"></head>
<body>
<div th:replace="~{fragments :: adminSidebar('members')}"></div>
<button id="ygc-mob-toggle" aria-label="Toggle menu"><i class="bi bi-list"></i></button>
<div class="main-content">
    <div th:replace="~{fragments :: topbar('Member Profile', 'Financial health, trust rating, and activity history', ${user.fullName})}"></div>
    <div th:replace="~{fragments :: alerts}"></div>

    <!-- Member Header -->
    <div class="card panel mb-4">
        <div class="card-body d-flex align-items-center gap-3 flex-wrap">
            <div style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#f0a500,#e8850c);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:20px;color:#fff" th:text="${member.fullName.substring(0,1)}"></div>
            <div class="me-auto">
                <h5 class="fw-bold mb-1" th:text="${member.fullName}"></h5>
                <small class="text-muted" th:text="${member.email}"></small>
                <span class="ms-2 badge" th:classappend="${member.active} ? 'bg-success' : 'bg-danger'" th:text="${member.active} ? 'Active' : 'Inactive'"></span>
            </div>
            <div class="text-center px-3" style="border-left:1px solid rgba(0,0,0,.08)">
                <div class="fw-bold fs-4" th:text="${riskScore}"></div>
                <small class="text-muted">Risk Score</small>
            </div>
            <div class="text-center px-3" style="border-left:1px solid rgba(0,0,0,.08)">
                <span class="badge fs-6" th:classappend="${trustRating == 'PLATINUM'} ? 'bg-primary' : (${trustRating == 'GOLD'} ? 'bg-warning text-dark' : (${trustRating == 'SILVER'} ? 'bg-secondary' : 'bg-danger'))" th:text="${trustRating}"></span>
                <div><small class="text-muted">Trust Rating</small></div>
            </div>
        </div>
    </div>

    <!-- Stats -->
    <div class="row g-3 mb-4">
        <div class="col-md-2 col-6"><div class="card stat-card h-100"><div class="card-body text-center py-2">
            <div class="fw-bold fs-4" th:text="${paymentScore} + '%'"></div><small class="text-muted">Payment Score</small>
        </div></div></div>
        <div class="col-md-2 col-6"><div class="card stat-card h-100"><div class="card-body text-center py-2">
            <div class="fw-bold fs-4" th:text="${totalPayments}"></div><small class="text-muted">Total Payments</small>
        </div></div></div>
        <div class="col-md-2 col-6"><div class="card stat-card h-100"><div class="card-body text-center py-2">
            <div class="fw-bold fs-4 text-success" th:text="${onTimePayments}"></div><small class="text-muted">On Time</small>
        </div></div></div>
        <div class="col-md-2 col-6"><div class="card stat-card h-100"><div class="card-body text-center py-2">
            <div class="fw-bold fs-4 text-danger" th:text="${overduePayments}"></div><small class="text-muted">Overdue</small>
        </div></div></div>
        <div class="col-md-2 col-6"><div class="card stat-card h-100"><div class="card-body text-center py-2">
            <div class="fw-bold fs-4" th:text="${activeChits}"></div><small class="text-muted">Active Chits</small>
        </div></div></div>
        <div class="col-md-2 col-6"><div class="card stat-card h-100"><div class="card-body text-center py-2">
            <div class="fw-bold fs-4" th:text="${completedChits}"></div><small class="text-muted">Completed</small>
        </div></div></div>
    </div>

    <div class="row g-4">
        <div class="col-md-6">
            <!-- Personal Info -->
            <div class="card panel mb-4">
                <div class="card-header"><i class="bi bi-person text-primary me-2"></i>Personal Information</div>
                <div class="card-body p-0"><table class="table mb-0 small">
                    <tr><td class="text-muted" style="width:40%">Phone</td><td th:text="${member.phone != null ? member.phone : '—'}"></td></tr>
                    <tr><td class="text-muted">Address</td><td th:text="${member.address != null ? member.address : '—'}"></td></tr>
                    <tr><td class="text-muted">Aadhaar</td><td><code th:text="${member.maskedAadhaar}"></code>
                        <span class="badge ms-1" th:classappend="${member.aadhaarVerified} ? 'bg-success' : 'bg-danger'" th:text="${member.aadhaarVerified} ? 'Verified' : 'Pending'"></span></td></tr>
                    <tr><td class="text-muted">Joined</td><td th:text="${#temporals.format(member.createdAt, 'dd MMM yyyy')}"></td></tr>
                    <tr><td class="text-muted">Last Login</td><td th:text="${member.lastLoginAt != null ? #temporals.format(member.lastLoginAt, 'dd MMM HH:mm') : 'Never'}"></td></tr>
                    <tr><td class="text-muted">Last IP</td><td><code style="font-size:.7rem" th:text="${member.lastLoginIp != null ? member.lastLoginIp : '—'}"></code></td></tr>
                    <tr><td class="text-muted">Failed Logins</td><td><span class="badge" th:classappend="${member.consecutiveFailedLogins > 0} ? 'bg-danger' : 'bg-success'" th:text="${member.consecutiveFailedLogins}"></span></td></tr>
                </table></div>
            </div>
        </div>
        <div class="col-md-6">
            <!-- Chit Memberships -->
            <div class="card panel mb-4">
                <div class="card-header"><i class="bi bi-collection text-warning me-2"></i>Chit Memberships (<span th:text="${memberships.size()}"></span>)</div>
                <div class="card-body p-0"><table class="table table-hover mb-0 small">
                    <thead class="table-light"><tr><th>Chit</th><th>Status</th><th>Agreement</th><th>Won</th></tr></thead>
                    <tbody>
                    <tr th:each="m : ${memberships}" style="cursor:pointer" th:onclick="'window.location.href=\'/admin/chits/' + ${m.chit.id} + '\''">
                        <td class="fw-semibold" th:text="${m.chit.name}"></td>
                        <td><span class="badge" th:classappend="${m.status.name() == 'ACTIVE'} ? 'bg-success' : (${m.status.name() == 'PENDING'} ? 'bg-warning text-dark' : 'bg-secondary')" th:text="${m.status}"></span></td>
                        <td><span class="badge" th:classappend="${m.agreementAccepted} ? 'bg-success' : 'bg-secondary'" th:text="${m.agreementAccepted} ? '✓' : '✗'"></span></td>
                        <td><span class="badge" th:classappend="${m.hasWonAuction} ? 'bg-warning text-dark' : 'bg-light text-muted'" th:text="${m.hasWonAuction} ? 'Yes' : 'No'"></span></td>
                    </tr>
                    </tbody>
                </table></div>
            </div>

            <!-- Recent Logins -->
            <div class="card panel">
                <div class="card-header"><i class="bi bi-clock-history text-info me-2"></i>Recent Logins</div>
                <div class="card-body p-0"><table class="table mb-0 small">
                    <thead class="table-light"><tr><th>Time</th><th>IP</th><th>Status</th></tr></thead>
                    <tbody>
                    <tr th:each="l : ${loginHistory}">
                        <td th:text="${#temporals.format(l.loginAt, 'dd MMM HH:mm')}"></td>
                        <td><code style="font-size:.7rem" th:text="${l.ipAddress}"></code></td>
                        <td><span class="badge" th:classappend="${l.success} ? 'bg-success' : 'bg-danger'" th:text="${l.success} ? 'OK' : 'FAIL'"></span></td>
                    </tr>
                    </tbody>
                </table></div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments :: appScripts}"></div>
</body></html>
