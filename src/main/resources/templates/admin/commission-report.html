<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Commission Report')}"></head>
<body>
<div th:replace="~{fragments :: adminSidebar('commission')}"></div>
<button id="ygc-mob-toggle" aria-label="Toggle menu"><i class="bi bi-list"></i></button>
<div class="main-content">
    <div class="topbar">
        <div><h4><i class="bi bi-graph-up text-warning me-2"></i>Commission Report</h4><div class="sub">Auto-calculated admin commissions per chit and auction</div></div>
        <div class="d-flex align-items-center gap-2">
            <a th:href="@{/admin/reports/commission/pdf}" class="btn btn-sm btn-outline-warning fw-bold" title="Export commission report as PDF">
                <i class="bi bi-file-earmark-pdf me-1"></i>Export PDF
            </a>
            <span class="ygc-conn-dot" title="Live notifications active"></span>
            <button id="ygc-bell-btn" class="btn btn-link p-0 position-relative text-secondary" title="Notifications" aria-label="Show notifications" style="font-size:1.3rem;line-height:1">
              <i class="bi bi-bell"></i>
              <span id="ygc-notif-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size:.6rem;display:none"></span>
            </button>
            <div class="user-badge" th:text="${user.fullName}">Admin</div>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-4"><div class="card stat-card"><div class="card-body d-flex align-items-center gap-3">
            <div class="stat-icon bg-warning bg-opacity-10 text-warning"><i class="bi bi-currency-rupee"></i></div>
            <div><div class="fw-bold fs-4" th:text="'₹' + ${totalCommission}">₹0</div><small class="text-muted">Total Commission Earned</small></div>
        </div></div></div>
        <div class="col-md-4"><div class="card stat-card"><div class="card-body d-flex align-items-center gap-3">
            <div class="stat-icon bg-primary bg-opacity-10 text-primary"><i class="bi bi-collection"></i></div>
            <div><div class="fw-bold fs-4" th:text="${chits.size()}">0</div><small class="text-muted">Total Chit Groups</small></div>
        </div></div></div>
        <div class="col-md-4"><div class="card stat-card"><div class="card-body d-flex align-items-center gap-3">
            <div class="stat-icon bg-success bg-opacity-10 text-success"><i class="bi bi-list-check"></i></div>
            <div><div class="fw-bold fs-4" th:text="${ledger.size()}">0</div><small class="text-muted">Commission Entries</small></div>
        </div></div></div>
    </div>

    <div class="card panel">
        <div class="card-header"><i class="bi bi-table me-2"></i>Commission Ledger</div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light"><tr><th>Chit</th><th>Source</th><th>Commission %</th><th>Commission Amount</th><th>Month</th><th>Date</th></tr></thead>
                <tbody>
                <tr th:each="entry : ${ledger}">
                    <td th:text="${entry.chit.name}"></td>
                    <td>
                        <span class="badge" th:classappend="${entry.source == 'AUCTION'} ? 'bg-warning text-dark' : 'bg-primary'" th:text="${entry.source}"></span>
                    </td>
                    <td th:text="${entry.commissionPercentage} + '%'"></td>
                    <td class="fw-bold text-success" th:text="'₹' + ${entry.commissionAmount}"></td>
                    <td th:text="${entry.month}"></td>
                    <td th:text="${#temporals.format(entry.createdAt, 'dd MMM yyyy')}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(ledger)}"><td colspan="6" class="text-center text-muted py-4">No commission entries yet</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<div th:replace="~{fragments :: appScripts}"></div>
</body></html>
