<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - YGC Internal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; display: flex; align-items: center; padding: 24px 0; }
        .register-card { border: none; border-radius: 20px; box-shadow: 0 25px 70px rgba(0,0,0,0.5); }
        .brand-title { color: #f0a500; font-weight: 800; }
        .brand-icon { width: 52px; height: 52px; background: #f0a500; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.5rem; color: #000; margin: 0 auto 12px; }
        .btn-register { background: #f0a500; border: none; color: #000; font-weight: 700; padding: 12px; border-radius: 10px; }
        .btn-register:hover { background: #d4930a; color: #000; }
        .form-control:focus { border-color: #f0a500; box-shadow: 0 0 0 .2rem rgba(240,165,0,.2); }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="register-card card">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <div class="brand-icon">Y</div>
                        <h3 class="brand-title mb-0">YGC Internal</h3>
                        <p class="text-muted small">Create Your Account</p>
                    </div>

                    <div th:if="${error}" class="alert alert-danger py-2"><i class="bi bi-exclamation-circle me-2"></i><span th:text="${error}"></span></div>
                    <div th:if="${success}" class="alert alert-success py-2"><i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span></div>

                    <div class="alert alert-info py-2 small mb-3">
                        <i class="bi bi-info-circle me-2"></i>A temporary password will be sent to your email. You must change it on first login.
                    </div>

                    <form th:action="@{/register}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Full Name <span class="text-danger">*</span></label>
                            <input type="text" name="fullName" class="form-control" placeholder="Your full name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email Address <span class="text-danger">*</span></label>
                            <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Phone Number <span class="text-danger">*</span></label>
                            <input type="tel" name="phone" class="form-control" placeholder="+91 XXXXX XXXXX" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Address</label>
                            <textarea name="address" class="form-control" rows="2" placeholder="Your address (optional)"></textarea>
                        </div>
                        <button type="submit" class="btn btn-register w-100"><i class="bi bi-person-plus me-2"></i>Register Account</button>
                    </form>
                    <hr>
                    <p class="text-center mb-2">Already registered? <a th:href="@{/login}" class="fw-bold text-warning">Login here</a></p>
                    <p class="text-center mb-0 small"><a th:href="@{/terms}" class="text-muted">View Terms &amp; Conditions</a></p>
                </div>
            </div>
            <p class="text-center mt-3 text-white-50 small">Support: <a href="tel:+918919508889" class="text-warning">+91 8919508889</a></p>
        </div>
    </div>
</div>
</body></html>
