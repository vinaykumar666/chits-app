<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" th:href="@{/manifest.json}">
  <title>Register - YGC Internal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <style>
    :root { --gold:#f0a500; --dark:#0f0f1a; }
    * { box-sizing: border-box; }
    body {
      background: linear-gradient(160deg, #0f0f1a, #161628 30%, #1a1a35 60%, #0f3460);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: 'Inter', system-ui, sans-serif;
      padding: 16px;
    }
    .register-wrapper { width: 100%; max-width: 460px; }
    .register-card {
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 24px;
      box-shadow: 0 32px 80px rgba(0,0,0,.5);
      background: rgba(22,22,40,.85);
      backdrop-filter: blur(24px);
    }
    .card-body { padding: 40px; }
    .brand-icon { width: 52px; height: 52px; background: linear-gradient(135deg, #f0a500, #f5c542); border-radius: 16px;
      display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.5rem; color: #000;
      margin: 0 auto 12px; box-shadow: 0 8px 24px rgba(240,165,0,.3); }
    .brand-title { color: var(--gold); font-weight: 900; font-size: 1.6rem; }
    .form-label { color: rgba(255,255,255,.4); font-weight: 700; font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; }
    .form-control { font-size: 16px; border-radius: 12px; padding: 13px 16px; min-height: 50px;
      background: rgba(255,255,255,.06); border: 1.5px solid rgba(255,255,255,.08); color: #fff; }
    .form-control::placeholder { color: rgba(255,255,255,.2); }
    .form-control:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(240,165,0,.15); background: rgba(255,255,255,.08); color: #fff; }
    .btn-register { background: linear-gradient(135deg, #f0a500, #f5c542, #e89900); border: none; color: #000;
      font-weight: 800; padding: 14px; font-size: 1rem; border-radius: 12px; width: 100%;
      box-shadow: 0 4px 16px rgba(240,165,0,.3); transition: all .25s; }
    .btn-register:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(240,165,0,.4); color: #000; }
    .alert { border-radius: 12px; border: none; }
    .alert-danger { background: rgba(239,68,68,.12); color: #fca5a5; }
    .text-muted { color: rgba(255,255,255,.35) !important; }
    a.text-warning { color: var(--gold) !important; }
    @media (max-width: 480px) { .card-body { padding: 28px 20px; } }
  </style>
</head>
<body>
<div class="register-wrapper">
  <div class="register-card card">
    <div class="card-body">
      <div class="text-center mb-4">
        <div class="brand-icon">Y</div>
        <div class="brand-title">Join YGC</div>
        <p class="text-muted small mb-0 mt-1" style="letter-spacing:.05em">Create your member account</p>
      </div>

      <div th:if="${error}" class="alert alert-danger py-2 small"><i class="bi bi-exclamation-circle me-2"></i><span th:text="${error}"></span></div>

      <form th:action="@{/register}" method="post">
        <div class="mb-3">
          <label class="form-label">Email Address *</label>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required inputmode="email">
        </div>
        <div class="mb-3">
          <label class="form-label">Full Name *</label>
          <input type="text" name="fullName" class="form-control" placeholder="Your full name" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Phone Number *</label>
          <input type="tel" name="phone" class="form-control" placeholder="+91 XXXXXXXXXX" required inputmode="tel">
        </div>
        <div class="mb-3">
          <label class="form-label">Aadhaar Number *</label>
          <input type="text" name="aadhaarNumber" class="form-control" placeholder="XXXX XXXX XXXX"
                 required pattern="\d{4}\s?\d{4}\s?\d{4}" maxlength="14" inputmode="numeric"
                 title="Enter 12-digit Aadhaar number">
          <div style="margin-top:6px;padding:8px 12px;border-radius:8px;background:rgba(240,165,0,.08);border:1px solid rgba(240,165,0,.15)">
            <small style="color:rgba(255,255,255,.5);font-size:.7rem">
              <i class="bi bi-shield-lock me-1" style="color:#f0a500"></i>
              <strong style="color:#f0a500">Encrypted & Secure:</strong>
              Your Aadhaar number is encrypted with AES-256 and stored securely. It is used solely for identity verification as per KYC norms and will never be shared with third parties.
            </small>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Address *</label>
          <input type="text" name="address" class="form-control" placeholder="City, State" required>
        </div>
        <button type="submit" class="btn btn-register">
          <i class="bi bi-person-plus me-2"></i>Create Account
        </button>
      </form>

      <div style="height:1px;background:rgba(255,255,255,.06);margin:24px 0"></div>

      <p class="text-center mb-0 small" style="color:rgba(255,255,255,.4)">
        Already have an account? <a th:href="@{/login}" class="fw-bold text-warning text-decoration-none">Login</a>
      </p>
    </div>
  </div>
</div>
<div th:replace="~{fragments :: appScripts}"></div>
</body>
</html>
