<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="YGC Chits">
  <link rel="manifest" th:href="@{/manifest.json}">
  <link rel="apple-touch-icon" th:href="@{/icons/icon-192.png}">
  <title>Register - YGC Internal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <style>
    :root { --gold:#f0a500; --gold-dark:#d4930a; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh; min-height: 100dvh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: env(safe-area-inset-top,16px) env(safe-area-inset-right,16px) env(safe-area-inset-bottom,16px) env(safe-area-inset-left,16px);
      display: flex; align-items: flex-start; justify-content: center;
    }
    .register-wrapper { width: 100%; max-width: 440px; padding: 16px; }
    .register-card { border: none; border-radius: 20px; box-shadow: 0 25px 70px rgba(0,0,0,.5); }
    .card-body { padding: 36px 32px; }
    .brand-icon { width: 52px; height: 52px; background: var(--gold); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.5rem; color: #000; margin: 0 auto 12px; }
    .brand-title { color: var(--gold); font-weight: 800; }
    .btn-register { background: var(--gold); border: none; color: #000; font-weight: 700; padding: 14px; border-radius: 10px; width: 100%; min-height: 48px; font-size: 1rem; }
    .btn-register:hover { background: var(--gold-dark); color: #000; }
    .form-control, textarea.form-control { font-size: 16px; border-radius: 10px; min-height: 48px; }
    textarea.form-control { min-height: 80px; }
    .form-control:focus { border-color: var(--gold); box-shadow: 0 0 0 .2rem rgba(240,165,0,.2); }
    @media (max-width: 480px) { .card-body { padding: 24px 16px; } }
  </style>
</head>
<body>
<div class="register-wrapper">
  <div class="register-card card">
    <div class="card-body">
      <div class="text-center mb-4">
        <div class="brand-icon">Y</div>
        <h3 class="brand-title mb-0">YGC Internal</h3>
        <p class="text-muted small">Create Your Account</p>
      </div>

      <div th:if="${error}"   class="alert alert-danger py-2 small"><i class="bi bi-exclamation-circle me-2"></i><span th:text="${error}"></span></div>
      <div th:if="${success}" class="alert alert-success py-2 small"><i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span></div>

      <div class="alert alert-info py-2 small mb-3">
        <i class="bi bi-info-circle me-2"></i>A temporary password will be sent to your email.
      </div>

      <form th:action="@{/register}" method="post" autocomplete="on">
        <div class="mb-3">
          <label class="form-label fw-semibold small">Full Name <span class="text-danger">*</span></label>
          <input type="text" name="fullName" class="form-control" placeholder="Your full name"
                 required autocomplete="name" autocapitalize="words">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold small">Email Address <span class="text-danger">*</span></label>
          <input type="email" name="email" class="form-control" placeholder="you@example.com"
                 required autocomplete="email" inputmode="email">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold small">Phone Number <span class="text-danger">*</span></label>
          <input type="tel" name="phone" class="form-control" placeholder="+91 XXXXX XXXXX"
                 required autocomplete="tel" inputmode="tel">
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold small">Address</label>
          <textarea name="address" class="form-control" rows="2" placeholder="Your address (optional)" autocomplete="street-address"></textarea>
        </div>
        <button type="submit" class="btn btn-register">
          <i class="bi bi-person-plus me-2"></i>Register Account
        </button>
      </form>

      <hr class="my-3">
      <p class="text-center mb-2 small">Already registered? <a th:href="@{/login}" class="fw-bold text-warning">Login here</a></p>
      <p class="text-center mb-0 small"><a th:href="@{/terms}" class="text-muted">View Terms &amp; Conditions</a></p>
    </div>
  </div>
  <p class="text-center mt-3 text-white-50 small">Support: <a href="tel:+918919508889" class="text-warning">+91 8919508889</a></p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});</script>
</body>
</html>
