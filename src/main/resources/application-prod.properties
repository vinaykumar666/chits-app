# Application
spring.application.name=YGC Internal Chit Management
server.port=${PORT:8080}

# H2 Database (Production)
spring.datasource.url=jdbc:h2:mem:ygcdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=false

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.fetch_size=50

# Thymeleaf
spring.thymeleaf.cache=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Mail
spring.mail.host=smtp.resend.com
spring.mail.port=587
#spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
#ygc.mail.from=${MAIL_FROM:${MAIL_USERNAME}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_CONNECTION_TIMEOUT:20000}
spring.mail.properties.mail.smtp.timeout=${MAIL_TIMEOUT:20000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_WRITE_TIMEOUT:20000}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# YGC Business Rules
ygc.late-fine-per-day=20
ygc.early-exit-deduction-percentage=2
ygc.default-admin-commission-percentage=5
ygc.app-name=YGC Internal
ygc.app-tagline=Save Rupee, Rupee Will Save You In Future

# Async support
spring.task.execution.pool.core-size=2

# Logging
logging.level.root=INFO
logging.level.com.ygc=DEBUG

