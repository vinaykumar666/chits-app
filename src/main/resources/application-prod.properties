# Application
spring.application.name=YGC Internal Chit Management
server.port=${PORT:8080}

# H2 Database (Production)
# PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ygcdb}
spring.datasource.username=${DB_USERNAME:ygcuser}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.fetch_size=50

# Thymeleaf
spring.thymeleaf.cache=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Mail
resend.api.key=${RESEND_API_KEY}
resend.from.email=onboarding@resend.dev
resend.base.url=https://api.resend.com

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# YGC Business Rules
ygc.late-fine-per-day=20
ygc.early-exit-deduction-percentage=2
ygc.default-admin-commission-percentage=5
ygc.app-name=YGC Internal
ygc.app-tagline=Save Rupee, Rupee Will Save You In Future

# Async support
spring.task.execution.pool.core-size=2

# Logging
logging.level.root=INFO
logging.level.com.ygc=DEBUG

